{% extends "base.html" %}
{% block title %}订单库存联动 - 苍赋管理系统{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <h5 class="text-light mb-3"><i class="bi bi-arrow-left-right me-2"></i>订单库存联动
    <span class="text-white-50 small ms-2">预留 / 出库 / 释放 / 退货 · 幂等处理</span></h5>

  <div class="row g-3 mb-3" id="summaryCards"></div>

  <div class="card data-card mb-3"><div class="card-body">
    <div class="row g-2 align-items-end">
      <div class="col-md-4"><label class="form-label text-white-50 small">单张订单处理 / 查看</label>
        <div class="input-group input-group-sm">
          <input id="oid" class="form-control bg-dark text-white border-secondary" placeholder="订单ID 如 1-50354">
          <button class="btn btn-outline-info" onclick="viewState()">查看</button>
          <button class="btn btn-outline-light" onclick="previewAlloc()">分仓预览</button>
          {% if can_manage_inv %}<button class="btn btn-primary" onclick="processOne()">处理</button>{% endif %}
        </div></div>
      {% if can_manage_inv %}
      <div class="col-md-3"><label class="form-label text-white-50 small">批量处理最近 N 单</label>
        <div class="input-group input-group-sm">
          <input id="batchLimit" type="number" value="500" class="form-control bg-dark text-white border-secondary">
          <button class="btn btn-warning" onclick="processBatch()">批量处理</button>
        </div></div>
      {% endif %}
      <div class="col-md-5"><div id="actionMsg" class="small text-info"></div></div>
    </div>
    <div id="stateDetail" class="mt-3"></div>
  </div></div>

  <div class="d-flex gap-2 mb-2">
    <select id="stateFilter" class="form-select form-select-sm bg-dark text-white border-secondary" style="max-width:200px" onchange="loadStates()">
      <option value="">全部状态</option><option value="reserved">已预留</option><option value="shipped">已出库</option>
      <option value="released">已释放</option><option value="returned">已退货</option><option value="blocked">未映射阻塞</option></select>
  </div>
  <div class="card data-card"><div class="card-body p-0"><div class="table-responsive">
    <table class="table table-dark table-hover align-middle mb-0">
      <thead><tr class="text-white-50 small"><th>订单</th><th>订单状态</th><th>库存状态</th><th>仓库</th><th>市场</th><th>备注</th><th>处理时间</th></tr></thead>
      <tbody id="stTbody"><tr><td colspan="7" class="text-center text-white-50 py-4">加载中...</td></tr></tbody>
    </table></div></div></div>
</div>
<script>
const CAN_MANAGE={{ 'true' if can_manage_inv else 'false' }};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
const qs=id=>document.getElementById(id);
const SB={reserved:'<span class="badge bg-info">已预留</span>',shipped:'<span class="badge bg-success">已出库</span>',released:'<span class="badge bg-secondary">已释放</span>',returned:'<span class="badge bg-warning text-dark">已退货</span>',blocked:'<span class="badge bg-danger">未映射阻塞</span>',none:'<span class="badge bg-dark border">未处理</span>'};
const VIA={exact:'精确',product:'产品级',wc_sku:'WC SKU',taxonomy:'品牌解析',unmatched:'未映射'};

async function viewState(){
  const oid=qs('oid').value.trim();if(!oid)return;
  const r=await fetch('/api/inv/order-state/'+encodeURIComponent(oid));const j=await r.json();
  if(!r.ok){qs('stateDetail').innerHTML='<span class="text-danger">'+esc(j.error||'失败')+'</span>';return;}
  qs('stateDetail').innerHTML=`<div class="border border-secondary border-opacity-25 rounded p-2">
    订单状态 <b>${esc(j.order_status)}</b> → 目标效果 <b>${esc(j.target_effect||'忽略')}</b> · 当前库存状态 ${SB[j.inv_state]||j.inv_state} · 市场 ${esc(j.market||'?')}
    <table class="table table-dark table-sm mt-2 mb-0"><thead><tr class="small text-white-50"><th>商品</th><th>数量</th><th>SKU</th><th>折合</th><th>路径</th></tr></thead><tbody>
    ${j.resolved.lines.map(l=>`<tr class="${l.sku_id?'':'text-warning'}"><td>${esc(l.name)}</td><td>${l.qty}</td><td>${l.sku_code?('<code>'+esc(l.sku_code)+'</code>'):'未映射'}</td><td>${l.sku_qty}</td><td>${VIA[l.match_via]||l.match_via}</td></tr>`).join('')}
    </tbody></table></div>`;
}
async function previewAlloc(){
  const oid=qs('oid').value.trim();if(!oid)return;
  const r=await fetch('/api/inv/allocate-preview/'+encodeURIComponent(oid));const j=await r.json();
  if(!r.ok){qs('stateDetail').innerHTML='<span class="text-danger">'+esc(j.error||'失败')+'</span>';return;}
  if(j.blocked){qs('stateDetail').innerHTML='<span class="text-warning">有 '+j.unmatched+' 行未映射,无法分仓</span>';return;}
  const p=j.plan;
  let html=`<div class="border border-secondary border-opacity-25 rounded p-2">市场 <b>${esc(j.market||'?')}</b> · 方案 <b>${esc(p.reason)}</b> ${p.is_split?'<span class="badge bg-warning text-dark">拆单</span>':'<span class="badge bg-success">单仓</span>'}`;
  html+=p.allocations.map(a=>`<div class="mt-1">📦 <b>${esc(a.name)}</b> ${a.ownership_type==='partner'?('<span class="badge bg-warning text-dark">合伙人'+(a.partner_name?(' '+esc(a.partner_name)):'')+'</span>'):'<span class="badge bg-info">自营</span>'}: ${a.lines.map(l=>esc(l.sku_code||l.sku_id)+'×'+l.qty).join(', ')}</div>`).join('');
  if(p.shortage&&Object.keys(p.shortage).length)html+=`<div class="text-danger mt-1">缺货: ${JSON.stringify(p.shortage)}</div>`;
  html+='</div>';qs('stateDetail').innerHTML=html;
}
async function processOne(){
  const oid=qs('oid').value.trim();if(!oid)return;
  const r=await fetch('/api/inv/process-order/'+encodeURIComponent(oid),{method:'POST'});const j=await r.json();
  qs('actionMsg').textContent=r.ok?('处理结果: '+(j.action||'')+(j.warehouse_id?(' @仓'+j.warehouse_id):'')):(j.error||'失败');
  viewState();loadStates();
}
async function processBatch(){
  if(!confirm('批量处理最近 '+qs('batchLimit').value+' 单的库存联动?'))return;
  qs('actionMsg').textContent='处理中...';
  const r=await fetch('/api/inv/process-orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limit:parseInt(qs('batchLimit').value)})});
  const j=await r.json();if(!r.ok){qs('actionMsg').textContent=j.error||'失败';return;}
  qs('actionMsg').textContent=`处理 ${j.processed} 单 · `+Object.entries(j.counts).map(([k,v])=>k+':'+v).join(' / ');
  loadStates();
}
async function loadStates(){
  const st=qs('stateFilter').value;
  const r=await fetch('/api/inv/order-states'+(st?('?state='+st):''));const j=await r.json();
  qs('summaryCards').innerHTML=Object.entries(j.summary).map(([k,v])=>`<div class="col-auto"><div class="card data-card"><div class="card-body py-2 px-3"><div class="small text-white-50">${(SB[k]||k).replace(/<[^>]+>/g,'')}</div><div class="h5 mb-0">${v}</div></div></div></div>`).join('')||'<div class="col text-white-50 small">暂无处理记录</div>';
  qs('stTbody').innerHTML=j.items.length?j.items.map(s=>`<tr>
    <td><code>${esc(s.order_id)}</code></td><td>${esc(s.order_status||'')}</td><td>${SB[s.inv_state]||s.inv_state}</td>
    <td>${s.warehouse_id||''}</td><td>${esc(s.market_code||'')}</td><td class="small text-white-50">${esc(s.note||'')}</td>
    <td class="small text-white-50">${esc(s.processed_at||'')}</td></tr>`).join(''):'<tr><td colspan="7" class="text-center text-white-50 py-4">暂无</td></tr>';
}
loadStates();
</script>
{% endblock %}
