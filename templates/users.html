{% extends "base.html" %}

{% block title %}用户管理 - 苍赋管理系统{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 text-white mb-1">用户管理</h1>
            <p class="text-white-50 mb-0">管理系统用户和权限</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/settings" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> 返回设置
            </a>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="bi bi-person-plus me-1"></i> 添加用户
            </button>
        </div>
    </div>

    <!-- Users List -->
    <div class="card data-card mb-4">
        <div class="card-header border-bottom border-secondary border-opacity-25 bg-transparent py-3">
            <h5 class="card-title text-white mb-0">用户列表</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0" style="--bs-table-bg: transparent;">
                    <thead>
                        <tr>
                            <th class="ps-4">用户名</th>
                            <th>显示名称</th>
                            <th>角色</th>
                            <th>创建时间</th>
                            <th class="text-end pe-4">操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="5" class="text-center py-4 text-muted">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Change Password Card -->
    <div class="card data-card">
        <div class="card-header border-bottom border-secondary border-opacity-25 bg-transparent py-3">
            <h5 class="card-title text-white mb-0"><i class="bi bi-key me-2"></i>修改我的密码</h5>
        </div>
        <div class="card-body">
            <form id="changePasswordForm">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label text-white-50">当前密码</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="oldPassword"
                            required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-white-50">新密码</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="newPassword"
                            required>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i>修改密码
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Add User Modal -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark border border-secondary border-opacity-25">
            <div class="modal-header border-bottom border-secondary border-opacity-25">
                <h5 class="modal-title text-white">添加用户</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="addUserForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-white-50">用户名 *</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="addUsername"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50">密码 *</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary" id="addPassword"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50">显示名称</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="addName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50">角色</label>
                        <select class="form-select bg-dark text-white border-secondary" id="addRole">
                            <option value="user">普通用户</option>
                            <option value="viewer">只读用户</option>
                            {% if is_super_admin %}
                            <option value="admin">管理员</option>
                            {% endif %}
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-top border-secondary border-opacity-25">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit User Modal -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark border border-secondary border-opacity-25">
            <div class="modal-header border-bottom border-secondary border-opacity-25">
                <h5 class="modal-title text-white">编辑用户</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label text-white-50">用户名</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="editUsername"
                            disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50">新密码（留空不修改）</label>
                        <input type="password" class="form-control bg-dark text-white border-secondary"
                            id="editPassword">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50">显示名称</label>
                        <input type="text" class="form-control bg-dark text-white border-secondary" id="editName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50">角色</label>
                        <select class="form-select bg-dark text-white border-secondary" id="editRole">
                            <option value="user">普通用户</option>
                            <option value="viewer">只读用户</option>
                            {% if is_super_admin %}
                            <option value="admin">管理员</option>
                            {% endif %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="editCanShip">
                            <label class="form-check-label text-white-50" for="editCanShip">
                                <i class="bi bi-truck me-1"></i>发货权限
                            </label>
                        </div>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="editCanViewReport">
                            <label class="form-check-label text-white-50" for="editCanViewReport">
                                <i class="bi bi-file-earmark-bar-graph me-1"></i>查看报告权限
                            </label>
                        </div>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="editCanManageProducts">
                            <label class="form-check-label text-white-50" for="editCanManageProducts">
                                <i class="bi bi-pencil-square me-1"></i>产品管理权限
                                <small class="text-muted">（可编辑该用户名下站点的库存/价格；具体能改哪些站取决于"分配的站点"）</small>
                            </label>
                        </div>
                        {% if is_super_admin %}
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="editCanViewSalesBoard">
                            <label class="form-check-label text-white-50" for="editCanViewSalesBoard">
                                <i class="bi bi-kanban me-1"></i>销售看板权限
                            </label>
                        </div>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="editCanViewReconciliation">
                            <label class="form-check-label text-white-50" for="editCanViewReconciliation">
                                <i class="bi bi-cash-coin me-1"></i>合伙人对账 · 查看 <small class="text-muted">（可访问对账页面；合伙人成员默认只勾这一项）</small>
                            </label>
                        </div>
                        <div class="form-check mt-1 ms-4">
                            <input class="form-check-input" type="checkbox" id="editCanEditReconciliation">
                            <label class="form-check-label text-white-50" for="editCanEditReconciliation">
                                <i class="bi bi-pencil-square me-1"></i>合伙人对账 · 编辑 <small class="text-muted">（可生成对账单、录入收款、改合伙人设置。内部财务/admin 需勾上）</small>
                            </label>
                        </div>
                        <div class="form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="editCanViewCosts">
                            <label class="form-check-label text-white-50" for="editCanViewCosts">
                                <i class="bi bi-calculator me-1"></i>成本管理 · 查看 <small class="text-muted">（可访问产品成本管理页面；编辑成本仍需管理员）</small>
                            </label>
                        </div>
                        <div class="form-check mt-2" id="wrapCanManageUsers">
                            <input class="form-check-input" type="checkbox" id="editCanManageUsers">
                            <label class="form-check-label text-warning" for="editCanManageUsers">
                                <i class="bi bi-shield-fill-check me-1"></i>用户管理权限 <small class="text-muted">（可管理用户和权限）</small>
                            </label>
                        </div>
                        {% endif %}
                        <small class="text-muted">允许该用户访问发货管理、数据报告和销售看板功能</small>
                    </div>
                </div>
                <div class="modal-footer border-top border-secondary border-opacity-25">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Permissions Modal -->
<div class="modal fade" id="permissionsModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark border border-secondary border-opacity-25">
            <div class="modal-header border-bottom border-secondary border-opacity-25">
                <h5 class="modal-title text-white">站点权限</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="permUserId">
                <p class="text-white-50 mb-3">选择该用户可以访问的站点：</p>
                <div id="sitesCheckboxes">
                    <p class="text-muted">加载中...</p>
                </div>
            </div>
            <div class="modal-footer border-top border-secondary border-opacity-25">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="savePermissionsBtn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteUserModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark border border-secondary border-opacity-25">
            <div class="modal-header border-bottom border-secondary border-opacity-25">
                <h5 class="modal-title text-white">确认删除</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-white mb-0">确定要删除这个用户吗？此操作不可撤销。</p>
                <input type="hidden" id="deleteUserId">
            </div>
            <div class="modal-footer border-top border-secondary border-opacity-25">
                <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        loadUsers();

        // Use event delegation on tbody for all button clicks - this is more robust
        const tbody = document.getElementById('usersTableBody');
        tbody.addEventListener('click', function (e) {
            // Find the button that was clicked (could be the icon inside)
            const btn = e.target.closest('button');
            if (!btn) return;

            const userId = parseInt(btn.dataset.userId);
            if (isNaN(userId)) return;

            if (btn.classList.contains('btn-permissions')) {
                openPermissions(userId);
            } else if (btn.classList.contains('btn-edit')) {
                const user = window._usersData && window._usersData[userId];
                if (user) {
                    openEditUser(user.id, user.username, user.name || '', user.role, user.can_ship || 0, user.can_view_report || 0, user.can_view_sales_board || 0, user.can_manage_users || 0, user.can_view_reconciliation || 0, user.can_edit_reconciliation || 0, user.can_manage_products || 0, user.can_view_costs || 0);
                }
            } else if (btn.classList.contains('btn-delete')) {
                deleteUser(userId);
            }
        });

        function loadUsers() {
            fetch('/api/users')
                .then(res => res.json())
                .then(users => {
                    const tbody = document.getElementById('usersTableBody');
                    if (users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">暂无用户</td></tr>';
                        return;
                    }
                    // Store users data for event handlers
                    window._usersData = {};
                    users.forEach(u => { window._usersData[u.id] = u; });

                    // Helper function to escape special characters for display
                    const escapeHtml = (str) => {
                        if (!str) return '';
                        return str.replace(/&/g, '&amp;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;');
                    };

                    const isSuperAdmin = {{ 'true' if is_super_admin else 'false' }};
                    tbody.innerHTML = users.map(u => {
                        // Determine role badge
                        let roleBadge = '';
                        if (u.is_super_admin) {
                            roleBadge = '<span class="badge bg-danger">超级管理员</span>';
                        } else if (u.role === 'admin') {
                            roleBadge = '<span class="badge bg-warning">管理员</span>';
                        } else if (u.role === 'viewer') {
                            roleBadge = '<span class="badge bg-info">只读用户</span>';
                        } else {
                            roleBadge = '<span class="badge bg-secondary">普通用户</span>';
                        }

                        // Non-super-admin cannot operate on protected users
                        const canOperate = !u.is_protected;
                        const canDelete = canOperate && !u.is_super_admin;

                        return `
                        <tr>
                            <td class="ps-4 text-white">${escapeHtml(u.username)}</td>
                            <td class="text-white-50">${escapeHtml(u.name) || '-'}</td>
                            <td>${roleBadge}</td>
                            <td class="text-white-50">${u.created_at || '-'}</td>
                            <td class="text-end pe-4">
                                ${canOperate ? `
                                <button class="btn btn-sm btn-outline-info me-1 btn-permissions" data-user-id="${u.id}" title="权限设置">
                                    <i class="bi bi-shield-lock"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-primary me-1 btn-edit" data-user-id="${u.id}" title="编辑">
                                    <i class="bi bi-pencil"></i>
                                </button>` : `
                                <span class="badge bg-dark text-muted me-1"><i class="bi bi-lock me-1"></i>受保护</span>`}
                                ${canDelete ? `
                                <button class="btn btn-sm btn-outline-danger btn-delete" data-user-id="${u.id}" title="删除">
                                    <i class="bi bi-trash"></i>
                                </button>` : ''}
                            </td>
                        </tr>`;
                    }).join('');
                });
        }

        // Add User
        document.getElementById('addUserForm').addEventListener('submit', function (e) {
            e.preventDefault();
            fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('addUsername').value,
                    password: document.getElementById('addPassword').value,
                    name: document.getElementById('addName').value,
                    role: document.getElementById('addRole').value
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                        loadUsers();
                        this.reset();
                    } else {
                        alert('添加失败: ' + (data.error || '未知错误'));
                    }
                });
        });

        // Edit User
        window.openEditUser = function (id, username, name, role, can_ship, can_view_report, can_view_sales_board, can_manage_users, can_view_reconciliation, can_edit_reconciliation, can_manage_products, can_view_costs) {
            document.getElementById('editUserId').value = id;
            document.getElementById('editUsername').value = username;
            document.getElementById('editName').value = name;
            document.getElementById('editRole').value = role;
            document.getElementById('editCanShip').checked = can_ship == 1;
            document.getElementById('editCanViewReport').checked = can_view_report == 1;
            var pmEl = document.getElementById('editCanManageProducts');
            if (pmEl) pmEl.checked = can_manage_products == 1;
            var sbEl = document.getElementById('editCanViewSalesBoard');
            if (sbEl) sbEl.checked = can_view_sales_board == 1;
            var rcEl = document.getElementById('editCanViewReconciliation');
            if (rcEl) rcEl.checked = can_view_reconciliation == 1;
            var recEl = document.getElementById('editCanEditReconciliation');
            if (recEl) recEl.checked = can_edit_reconciliation == 1;
            var costsEl = document.getElementById('editCanViewCosts');
            if (costsEl) costsEl.checked = can_view_costs == 1;
            var cmEl = document.getElementById('editCanManageUsers');
            if (cmEl) cmEl.checked = can_manage_users == 1;
            document.getElementById('editPassword').value = '';
            // Enforce: edit implies view. If view is unchecked, disable edit.
            updateReconEditState();
            bootstrap.Modal.getOrCreateInstance(document.getElementById('editUserModal')).show();
        };

        // Keep "edit reconciliation" gated by "view reconciliation"
        function updateReconEditState() {
            var vEl = document.getElementById('editCanViewReconciliation');
            var eEl = document.getElementById('editCanEditReconciliation');
            if (!vEl || !eEl) return;
            if (!vEl.checked) {
                eEl.checked = false;
                eEl.disabled = true;
            } else {
                eEl.disabled = false;
            }
        }
        (function wireReconPerms() {
            var vEl = document.getElementById('editCanViewReconciliation');
            var eEl = document.getElementById('editCanEditReconciliation');
            if (vEl) vEl.addEventListener('change', updateReconEditState);
            if (eEl) eEl.addEventListener('change', function () {
                // If enabling edit, auto-enable view
                if (eEl.checked && vEl && !vEl.checked) vEl.checked = true;
            });
        })();

        document.getElementById('editUserForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            fetch(`/api/users/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('editName').value,
                    role: document.getElementById('editRole').value,
                    password: document.getElementById('editPassword').value,
                    can_ship: document.getElementById('editCanShip').checked ? 1 : 0,
                    can_view_report: document.getElementById('editCanViewReport').checked ? 1 : 0,
                    can_manage_products: (document.getElementById('editCanManageProducts') || {}).checked ? 1 : 0,
                    can_view_sales_board: (document.getElementById('editCanViewSalesBoard') || {}).checked ? 1 : 0,
                    can_view_reconciliation: (document.getElementById('editCanViewReconciliation') || {}).checked ? 1 : 0,
                    can_edit_reconciliation: (document.getElementById('editCanEditReconciliation') || {}).checked ? 1 : 0,
                    can_view_costs: (document.getElementById('editCanViewCosts') || {}).checked ? 1 : 0,
                    can_manage_users: (document.getElementById('editCanManageUsers') || {}).checked ? 1 : 0
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                        loadUsers();
                    } else {
                        alert('保存失败: ' + (data.error || '未知错误'));
                    }
                });
        });


        // Delete User - show modal instead of confirm() since browser blocks it
        window.deleteUser = function (id) {
            document.getElementById('deleteUserId').value = id;
            bootstrap.Modal.getOrCreateInstance(document.getElementById('deleteUserModal')).show();
        };

        // Handle actual delete when confirm button is clicked
        document.getElementById('confirmDeleteBtn').addEventListener('click', function () {
            const id = document.getElementById('deleteUserId').value;
            fetch(`/api/users/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    bootstrap.Modal.getInstance(document.getElementById('deleteUserModal')).hide();
                    if (data.success) {
                        loadUsers();
                    } else {
                        // Use modal or toast instead of alert if also blocked
                        console.error('删除失败:', data.error);
                        document.body.insertAdjacentHTML('beforeend', `
                            <div class="toast-container position-fixed top-0 end-0 p-3">
                                <div class="toast show bg-danger text-white" role="alert">
                                    <div class="toast-body">删除失败: ${data.error || '未知错误'}</div>
                                </div>
                            </div>
                        `);
                        setTimeout(() => document.querySelector('.toast-container')?.remove(), 3000);
                    }
                });
        });

        // Permissions
        window.openPermissions = function (userId) {
            document.getElementById('permUserId').value = userId;
            fetch(`/api/users/${userId}/permissions`)
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('sitesCheckboxes');
                    if (data.all_sites.length === 0) {
                        container.innerHTML = '<p class="text-muted">暂无站点</p>';
                        return;
                    }
                    container.innerHTML = data.all_sites.map(site => {
                        const checked = data.allowed_sites.includes(site.id) ? 'checked' : '';
                        const hostname = new URL(site.url).hostname;
                        return `
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" value="${site.id}" id="site_${site.id}" ${checked}>
                            <label class="form-check-label text-white" for="site_${site.id}">${hostname}</label>
                        </div>
                    `;
                    }).join('');
                    bootstrap.Modal.getOrCreateInstance(document.getElementById('permissionsModal')).show();
                });
        };

        document.getElementById('savePermissionsBtn').addEventListener('click', function () {
            const userId = document.getElementById('permUserId').value;
            const checkboxes = document.querySelectorAll('#sitesCheckboxes input[type="checkbox"]:checked');
            const siteIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

            fetch(`/api/users/${userId}/permissions`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ site_ids: siteIds })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        bootstrap.Modal.getInstance(document.getElementById('permissionsModal')).hide();
                        alert('权限已保存');
                    } else {
                        alert('保存失败');
                    }
                });
        });

        // Change Password
        document.getElementById('changePasswordForm').addEventListener('submit', function (e) {
            e.preventDefault();
            fetch('/api/users/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    old_password: document.getElementById('oldPassword').value,
                    new_password: document.getElementById('newPassword').value
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        alert('密码修改成功！');
                        this.reset();
                    } else {
                        alert('修改失败: ' + (data.error || '未知错误'));
                    }
                });
        });
    });
</script>
{% endblock %}
