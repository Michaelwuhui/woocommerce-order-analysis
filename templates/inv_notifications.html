{% extends "base.html" %}
{% block title %}库存通知中心 - 苍赋管理系统{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="text-light mb-0"><i class="bi bi-bell me-2"></i>库存通知中心
      <span class="text-white-50 small ms-2">补货 / 临期过期 / 滞销</span></h5>
    <div class="d-flex gap-2">
      {% if can_manage_inv %}<button class="btn btn-sm btn-outline-info" onclick="scan()"><i class="bi bi-arrow-repeat"></i> 立即扫描</button>{% endif %}
      <button class="btn btn-sm btn-outline-light" onclick="markAll()">全部已读</button>
    </div>
  </div>
  <div class="d-flex gap-2 mb-2">
    <select id="fStatus" class="form-select form-select-sm bg-dark text-white border-secondary" style="max-width:160px" onchange="load()">
      <option value="unread">未读</option><option value="read">已读</option><option value="dismissed">已忽略</option><option value="all">全部</option></select>
    <select id="fType" class="form-select form-select-sm bg-dark text-white border-secondary" style="max-width:160px" onchange="load()">
      <option value="">全部类型</option><option value="restock">补货</option><option value="near_expiry">临期</option><option value="expired">过期</option><option value="slow_moving">滞销</option></select>
    <span id="msg" class="small text-info align-self-center"></span>
  </div>
  <div class="card data-card"><div class="card-body p-0"><div class="table-responsive">
    <table class="table table-dark table-hover align-middle mb-0">
      <thead><tr class="text-white-50 small"><th>级别</th><th>类型</th><th>标题</th><th>详情</th><th>时间</th><th class="text-end">操作</th></tr></thead>
      <tbody id="tb"><tr><td colspan="6" class="text-center text-white-50 py-4">加载中...</td></tr></tbody>
    </table></div></div></div>
</div>
<script>
const CAN_MANAGE={{ 'true' if can_manage_inv else 'false' }};
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
const qs=id=>document.getElementById(id);
const SEV={info:'<span class="badge bg-info">提示</span>',warning:'<span class="badge bg-warning text-dark">警告</span>',danger:'<span class="badge bg-danger">紧急</span>'};
const TYPE={restock:'补货',near_expiry:'临期',expired:'过期',slow_moving:'滞销'};
async function load(){
  const p=new URLSearchParams({status:qs('fStatus').value}); if(qs('fType').value)p.set('type',qs('fType').value);
  const rows=await (await fetch('/api/inv/notifications?'+p)).json();
  qs('tb').innerHTML=rows.length?rows.map(r=>`<tr>
    <td>${SEV[r.severity]||r.severity}</td><td>${TYPE[r.ntype]||r.ntype}</td><td>${esc(r.title)}</td>
    <td class="small text-white-50">${esc(r.body||'')}</td><td class="small text-white-50">${esc(r.created_at||'')}</td>
    <td class="text-end">${r.status==='unread'?`<button class="btn btn-sm btn-outline-light me-1" onclick="mark(${r.id},'read')">已读</button>`:''}
      ${r.status!=='dismissed'?`<button class="btn btn-sm btn-outline-secondary" onclick="mark(${r.id},'dismiss')">忽略</button>`:''}</td></tr>`).join('')
    :'<tr><td colspan="6" class="text-center text-white-50 py-4">无通知</td></tr>';
}
async function mark(id,act){await fetch(`/api/inv/notifications/${id}/${act}`,{method:'POST'});load();if(window.invLoadBell)invLoadBell();}
async function markAll(){await fetch('/api/inv/notifications/mark-all-read',{method:'POST'});load();if(window.invLoadBell)invLoadBell();}
async function scan(){qs('msg').textContent='扫描中...';
  const j=await (await fetch('/api/inv/notifications/scan',{method:'POST'})).json();
  const g=j.generated||{};qs('msg').textContent=`新增 补货${g.restock||0}/临期过期${g.expiry||0}/滞销${g.slow_moving||0} · 邮件${j.emailed>=0?j.emailed+'封':'未配置/失败'}`;
  load();
}
load();
</script>
{% endblock %}
